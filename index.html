</div>

<div id="drawer-root"></div>
<div id="viewer-root"></div>

<script>
(function(){
  var SUPABASE_URL  = 'https://smmvhozhzeemojqrazbl.supabase.co';
  var SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNtbXZob3poemVlbW9qcXJhemJsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQyNzk4NzEsImV4cCI6MjA4OTg1NTg3MX0.ywFxo6-i9uMA-c3r1DcF_i5WD35YRm4S1xWWiTf40us';
  var STORAGE_BUCKET = 'File Uploads';
  var EDIT_ENDPOINT = '/api/edit';

  var _ordersCache = null;
  var _customerEmail = null;
  var _attachments = {};

  var token = new URLSearchParams(window.location.search).get('token');
  if (!token) { showNotFound(); return; }

  function sq(table, params) {
    return fetch(SUPABASE_URL + '/rest/v1/' + table + '?' + params, {
      headers: { 'apikey': SUPABASE_ANON, 'Authorization': 'Bearer ' + SUPABASE_ANON }
    }).then(function(r){ return r.json(); });
  }

  function uploadFile(file, pathPrefix, onProgress) {
    var safeName = file.name.replace(/[^a-zA-Z0-9._-]/g, '_');
    var path = pathPrefix + '/' + Date.now() + '-' + safeName;
    var encodedBucket = encodeURIComponent(STORAGE_BUCKET);
    var url = SUPABASE_URL + '/storage/v1/object/' + encodedBucket + '/' + encodeURIComponent(path);
    var xhr = new XMLHttpRequest();
    var promise = new Promise(function(resolve, reject){
      xhr.open('POST', url);
      xhr.setRequestHeader('Authorization', 'Bearer ' + SUPABASE_ANON);
      xhr.setRequestHeader('apikey', SUPABASE_ANON);
      xhr.setRequestHeader('Content-Type', file.type || 'application/octet-stream');
      xhr.upload.onprogress = function(e){
        if (e.lengthComputable && onProgress) {
          onProgress(Math.round((e.loaded / e.total) * 100));
        }
      };
      xhr.onload = function(){
        if (xhr.status >= 200 && xhr.status < 300) {
          resolve(SUPABASE_URL + '/storage/v1/object/public/' + encodedBucket + '/' + encodeURIComponent(path));
        } else {
          reject(new Error('Upload failed: ' + xhr.status));
        }
      };
      xhr.onerror = function(){ reject(new Error('Network error')); };
      xhr.onabort = function(){ reject(new Error('cancelled')); };
      xhr.send(file);
    });
    promise.xhr = xhr;
    return promise;
  }

  sq('customers', 'select=*&token=eq.' + token + '&limit=1').then(function(customers) {
    if (!customers || !customers.length) { showNotFound(); return; }
    var customer = customers[0];
    sq('orders', 'select=*&customer_id=eq.' + customer.id + '&order=created_at.desc').then(function(orders) {
      orders = orders || [];
      sq('quotes', 'select=*&customer_email=eq.' + encodeURIComponent(customer.email) + '&order=created_at.desc').then(function(quotes) {
        quotes = (quotes && Array.isArray(quotes)) ? quotes.filter(function(q){ return q.status !== 'paid'; }) : [];
        if (!orders.length && !quotes.length) { renderNoOrders(customer); return; }
        if (!orders.length) {
          _ordersCache = [];
          _customerEmail = customer.email;
          render(customer, [], quotes);
          return;
        }
        var orderIds = orders.map(function(o){ return o.shopify_order_id; });
        var orderIdFilter = 'shopify_order_id=in.(' + orderIds.join(',') + ')';
        Promise.all([
          sq('files', 'select=*&' + orderIdFilter + '&order=base_name.asc'),
          sq('file_versions', 'select=*&order=version.asc'),
          sq('edit_requests', 'select=*&order=created_at.asc'),
          sq('quotes', 'select=id,subtask_id&customer_email=eq.' + encodeURIComponent(customer.email) + '&status=eq.paid').catch(function(){ return []; })
        ]).then(function(res) {
          var files = res[0]||[], versions = res[1]||[], requests = res[2]||[], paidQuotes = res[3]||[];
          files = files.map(function(f) {
            f.all_versions  = versions.filter(function(v){ return v.file_id === f.id; });
            var paidQuoteIds = paidQuotes.filter(function(q){ return q.subtask_id === f.clickup_subtask_id; }).map(function(q){ return q.id; });
            f.edit_requests = requests.filter(function(r){ 
              return r.file_id === f.id || paidQuoteIds.indexOf(r.file_id) !== -1;
            });
            if (f.all_versions.length) {
              var maxV = Math.max.apply(null, f.all_versions.map(function(v){ return v.version; }));
              f.latest_version = maxV;
              f.current_files = f.all_versions.filter(function(v){ return v.version === maxV; });
            } else {
              f.latest_version = f.version || 1;
              f.current_files = [{
                id: 'base-' + f.id,
                version: f.version || 1,
                download_url: f.download_url,
                preview_url: f.preview_url,
                uploaded_at: f.created_at
              }];
            }
            return f;
          });
          orders = orders.map(function(o){
            o.files = files.filter(function(f){ return String(f.shopify_order_id) === String(o.shopify_order_id); });
            return o;
          });
          _ordersCache = orders;
          _customerEmail = customer.email;
          render(customer, orders, quotes);
        });
      }).catch(function(){
        _ordersCache = [];
        _customerEmail = customer.email;
        render(customer, orders, []);
      });
    });
  }).catch(showNotFound);

  function render(customer, orders, quotes) {

    document.getElementById('app-root').innerHTML = html;

    var quoteGroups = {};

    quotes.forEach(function(q) {

      }, 10);
    }

    var list = document.getElementById('orders-list');
    orders.forEach(function(o,i){
      list.appendChild(buildOrderCard(o));
      if (i === 0) setTimeout(function(){ toggleOrder(o.shopify_order_id); }, 10);

    if (!orders.length) {

  window.openQuoteHistory = function(fid) {
    var card = document.getElementById('qcard-' + fid);
    if (!card) card = document.querySelector('[data-fid="' + fid + '"]');
    var label = card ? (card.dataset.label || 'Design') : 'Design';
    var subtaskId = card ? (card.dataset.subtask || '') : '';

    var fileQuery = subtaskId
      ? SUPABASE_URL + '/rest/v1/files?clickup_subtask_id=eq.' + subtaskId + '&limit=1'
      : SUPABASE_URL + '/rest/v1/files?id=eq.' + fid + '&limit=1';

    fetch(fileQuery, {
      headers: { 'apikey': SUPABASE_ANON, 'Authorization': 'Bearer ' + SUPABASE_ANON }
    }).then(function(r){ return r.json(); }).then(function(fileRows) {
      var fileRow = fileRows && fileRows[0] ? fileRows[0] : null;
      var realFid = fileRow ? fileRow.id : fid;
      var previewSrc = fileRow ? (fileRow.original_preview_url || fileRow.preview_url || '') : '';

      if (!previewSrc && card) {
        var img = card.querySelector('.file-thumb img');
        if (img) previewSrc = img.src;
      }

      Promise.all([
        fetch(SUPABASE_URL + '/rest/v1/file_versions?file_id=eq.' + realFid + '&order=version.asc', {
          headers: { 'apikey': SUPABASE_ANON, 'Authorization': 'Bearer ' + SUPABASE_ANON }
        }).then(function(r){ return r.json(); }),
        fetch(SUPABASE_URL + '/rest/v1/edit_requests?file_id=eq.' + realFid + '&order=created_at.asc', {
          headers: { 'apikey': SUPABASE_ANON, 'Authorization': 'Bearer ' + SUPABASE_ANON }
        }).then(function(r){ return r.json(); })
      ]).then(function(res) {
        var versions = res[0] || [];
        var requests = res[1] || [];

        var versionGroups = {};
        versions.forEach(function(v){
          if (!versionGroups[v.version]) versionGroups[v.version] = [];
          versionGroups[v.version].push(v);
        });

        if (!versionGroups[1]) {
          versionGroups[1] = [{
            version: 1,
            download_url: previewSrc,
            preview_url: previewSrc,
            uploaded_at: fileRow ? fileRow.created_at : null
          }];
        }

        var versionNums = Object.keys(versionGroups).map(Number).sort(function(a,b){ return a-b; });
        var latestVersion = Math.max.apply(null, versionNums);

        var timeline = [];
        versionNums.forEach(function(vn){
          var filesAtV = versionGroups[vn];
          var ts = filesAtV[0].uploaded_at ? new Date(filesAtV[0].uploaded_at).getTime() : 0;
          timeline.push({ type: 'version', vn: vn, filesAtV: filesAtV, ts: ts });
        });
        requests.forEach(function(r){
          var ts = r.created_at ? new Date(r.created_at).getTime() : 0;
          timeline.push({ type: 'request', data: r, ts: ts });
        });
        timeline.sort(function(a,b){ return a.ts - b.ts; });

        var bodyHtml = '';
        timeline.forEach(function(item){
          if (item.type === 'version') {
            var vn = item.vn;
            var filesAtV = item.filesAtV;
            var isCur = vn === latestVersion;
            var date = filesAtV[0].uploaded_at ? new Date(filesAtV[0].uploaded_at).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}) : '';
            bodyHtml += '<div class="vgroup">' +
              '<div class="vgroup-head">' +
                '<div class="vgroup-num ' + (isCur?'current':'old') + '">' + (vn === 1 ? 'Orig' : 'v' + (vn - 1)) + '</div>' +
                '<div class="vgroup-label">' + (vn === 1 ? 'Original File' : 'Version ' + (vn - 1)) + (isCur ? '<span class="vgroup-cur-badge">CURRENT</span>' : '') + '</div>' +
                '<div class="vgroup-date">' + date + '</div>' +
              '</div>' +
              '<div class="vgroup-files">';
            filesAtV.forEach(function(v, i){
              var fileLabel = filesAtV.length > 1 ? 'File ' + (i+1) : 'Design file';
              var thumbSrc = previewSrc || v.preview_url || '';
              var dlUrl = v.download_url || previewSrc || '#';
              var thumb = thumbSrc ? '<img src="' + thumbSrc + '" onerror="this.parentElement.innerHTML=\'<div class=file-thumb-ph>&#128444;</div>\'">' : '<div class="file-thumb-ph">&#128444;</div>';
              bodyHtml += '<div class="file-row">' +
                '<div class="file-thumb" onclick="viewImg(this.dataset.src,this.dataset.lbl)" data-src="' + thumbSrc + '" data-lbl="' + label + ' ' + (vn === 1 ? 'Original' : 'v' + (vn-1)) + '">' + thumb + '</div>' +
                '<div class="file-info"><div class="file-label">' + (vn === 1 ? (fileRow && fileRow.original_file_name ? fileRow.original_file_name : 'Original upload') : fileLabel) + '</div><div class="file-meta">' + (vn === 1 ? 'Original file' : 'Version ' + (vn - 1)) + '</div></div>' +
                '<a href="' + dlUrl + '" class="file-dl" download target="_blank">&#11015; Download</a>' +
              '</div>';
            });
            bodyHtml += '</div></div>';
          } else {
            var r = item.data;
            var ip = r.status === 'in_progress';
            var rDate = r.created_at ? new Date(r.created_at).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}) : '';
            var atts = r.attachments;
            if (typeof atts === 'string') { try { atts = JSON.parse(atts); } catch(e){ atts = []; } }
            var axHtml = '';
            if (atts && atts.length) {
              axHtml = '<div style="margin-top:8px;display:flex;flex-direction:column;gap:4px;">' +
                atts.map(function(a){
                  return '<a href="' + a.url + '" target="_blank" style="display:flex;align-items:center;gap:6px;padding:5px 8px;background:#fff;border:1px solid #e8e2d8;border-radius:6px;font-size:11px;color:#3d3020;text-decoration:none;">' +
                    '<span style="color:#00aeef;">&#128206;</span>' +
                    '<span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">' + (a.name || 'attachment') + '</span>' +
                    '<span style="color:#00aeef;font-weight:600;">View</span>' +
                  '</a>';
                }).join('') + '</div>';
            }
            bodyHtml += '<div class="req-card ' + (ip?'req-pend':'req-res') + '" style="margin-left:0;margin-bottom:16px;">' +
              '<div class="req-head"><div class="' + (ip?'req-lbl-pend':'req-lbl-res') + '">' +
              (ip ? '<span class="pulse" style="width:6px;height:6px;background:#00aeef;"></span> IN PROGRESS' : 'EDIT REQUEST &middot; RESOLVED') +
              '</div><span class="req-date">' + rDate + '</span></div>' +
              '<p class="req-note">&ldquo;' + (r.customer_note||'') + '&rdquo;</p>' +
              axHtml + '</div>';
          }
        });

        document.getElementById('drawer-root').innerHTML =
          '<div class="overlay" onclick="closeDrawer()"><div class="drawer" onclick="event.stopPropagation()">' +
          '<div class="drawer-head"><div><div class="drawer-title">' + label + ' &mdash; History</div>' +
          '<div class="drawer-sub">' + versionNums.length + ' version' + (versionNums.length!==1?'s':'') + ' &middot; ' + requests.length + ' request' + (requests.length!==1?'s':'') + '</div></div>' +
          '<button class="drawer-close" onclick="closeDrawer()">&#10005;</button></div>' +
          '<div class="drawer-body">' + bodyHtml + '</div></div></div>';
        setTimeout(function(){
          var body = document.querySelector('.drawer-body');
          if (body) body.scrollTop = body.scrollHeight;
        }, 50);
      });
    });
  };

  window.cancelQuoteEdit = function(fid, subtaskId) {
    var actEl = _attachments[fid + '__el'] || document.getElementById('qact-q-' + fid) || document.getElementById('qact-' + fid);
    delete _attachments[fid];
    delete _attachments[fid + '__el'];
    if (!actEl) return;
    var card = document.getElementById('qcard-' + fid) || document.querySelector('[data-fid="' + fid + '"]');
    var label = card ? (card.dataset.label || 'Design') : 'Design';
    var ce = card ? (card.dataset.email || _customerEmail || '') : (_customerEmail || '');
    actEl.innerHTML = '<button class="btn btn-hist" onclick="window.openQuoteHistory(this.dataset.fid)" data-fid="' + fid + '">&#128339; History</button>' +
      (subtaskId ? '<button class="btn btn-edit" onclick="window.openQuoteEdit(this.dataset.fid,this.dataset.sub,this.dataset.lbl,this.dataset.em,this)" data-fid="' + fid + '" data-sub="' + subtaskId + '" data-lbl="' + label + '" data-em="' + ce + '">&#9999; Request Edit</button>' : '');
  };

  window.sendQuoteEdit = function(fid, subtaskId, label, ce) {
    var _qactEl = _attachments[fid + '__el'] || document.getElementById('qact-q-' + fid);
    var noteEl = _qactEl ? _qactEl.querySelector('textarea') : document.getElementById('qnote-' + fid);
    var note = noteEl ? noteEl.value.trim() : '';
    if (!note) return;
    var ax = (_attachments[fid] || []).filter(function(a){ return a && a.url; });
    var stillUploading = (_attachments[fid] || []).some(function(a){ return a && a.uploading; });
    if (stillUploading) { alert('Please wait for attachments to finish uploading.'); return; }
    if (_qactEl) _qactEl.innerHTML = '<div style="padding:8px 0;text-align:center;color:#a89880;font-size:12px;">Sending...</div>';
    var attachmentsPayload = ax.map(function(a){ return {name: a.name, url: a.url}; });
    var supabaseInsert = fetch(SUPABASE_URL + '/rest/v1/edit_requests', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'apikey': SUPABASE_ANON, 'Authorization': 'Bearer ' + SUPABASE_ANON, 'Prefer': 'return=representation' },
      body: JSON.stringify({ file_id: fid, customer_note: note, status: 'in_progress', attachments: attachmentsPayload })
    });
    var zapierNotify = fetch('/api/edit', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ clickup_subtask_id: subtaskId, file_name: label, note: note, customer_email: ce, file_id: fid, attachments: attachmentsPayload })
    });
    Promise.all([supabaseInsert, zapierNotify]).then(function(results) {
      if (!results[0].ok) throw new Error('Insert failed');
      delete _attachments[fid];
      delete _attachments[fid + '__el'];
      if (_qactEl) _qactEl.innerHTML = '<div class="sent">&#10003; Sent! Check your email for updates.</div><button class="btn btn-hist" onclick="window.openQuoteHistory(this.dataset.fid)" data-fid="' + fid + '">&#128339; History</button>' + (subtaskId ? '<button class="btn btn-edit" onclick="window.openQuoteEdit(this.dataset.fid,this.dataset.sub,this.dataset.lbl,this.dataset.em,this)" data-fid="' + fid + '" data-sub="' + subtaskId + '" data-lbl="' + label + '" data-em="' + ce + '">&#9999; Request Edit</button>' : '');
    }).catch(function() {
      if (_qactEl) _qactEl.innerHTML = '<div style="padding:8px 0;text-align:center;color:#00aeef;font-size:12px;">Error sending. Please try again.</div>';
    });
  };

  function buildQuoteCard(q) {
    return buildQuoteGroupCard([q], false);
  }

  function buildOrderCard(order) {
    var card = document.createElement('div');
    card.className = 'order-card';
    card.id = 'order-' + order.shopify_order_id;
    card.dataset.expanded = 'false';
    var filesCount = order.files.length;
    var inProg  = order.files.filter(function(f){ return f.revision_status === 'in_progress'; }).length;
    var delivered = order.files.filter(function(f){ return f.revision_status === 'delivered'; }).length;
    var orderDate = order.created_at ? new Date(order.created_at).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}) : '';
    var status = inProg ? 'In progress' : (delivered === filesCount && filesCount > 0 ? 'Ready' : 'Awaiting artwork');
    card.innerHTML =
      '<div class="order-row" onclick="toggleOrder(\'' + order.shopify_order_id + '\')">' +
        '<div class="order-info"><div class="order-num">Order #' + order.shopify_order_number + '</div>' +
        '<div class="order-sub">' + orderDate + ' &middot; ' + filesCount + ' design' + (filesCount!==1?'s':'') + ' &middot; ' + status + '</div></div>' +
        '<div class="order-chev">&#9662;</div>' +
      '</div>' +
      '<div class="order-detail" id="detail-' + order.shopify_order_id + '" style="display:none"></div>';
    return card;
  }

  window.toggleOrder = function(orderId) {
    var card = document.getElementById('order-' + orderId);
    var detail = document.getElementById('detail-' + orderId);
    if (card.dataset.expanded === 'true') {
      detail.style.display = 'none';
      card.dataset.expanded = 'false';
      return;
    }
    card.dataset.expanded = 'true';
    detail.style.display = 'block';
    renderOrderDetail(orderId);
  };

  function renderOrderDetail(orderId) {
    var order = _ordersCache.find(function(o){ return String(o.shopify_order_id) === String(orderId); });
    if (!order) return;
    var detail = document.getElementById('detail-' + orderId);
    var files = order.files;
    var inProg  = files.filter(function(f){ return f.revision_status === 'in_progress'; }).length;
    var revised = files.filter(function(f){ return f.is_revised && f.revision_status === 'delivered'; }).length;
    var waiting = files.filter(function(f){ return f.revision_status !== 'delivered' && f.revision_status !== 'in_progress'; }).length;
    var html = '<div class="files-header"><div><div class="files-title">Your Artwork Files</div>';
    html += '<div class="files-subtitle">' + files.length + ' design' + (files.length!==1?'s':'');
    if (revised) html += ' &middot; ' + revised + ' revised';
    if (inProg)  html += ' &middot; ' + inProg + ' in progress';
    if (waiting) html += ' &middot; ' + waiting + ' awaiting';
    html += '</div></div><div class="files-badges">';
    if (inProg)  html += '<div class="badge badge-progress"><span class="pulse" style="width:7px;height:7px;background:#00aeef;"></span>' + inProg + ' IN PROGRESS</div>';
    if (revised) html += '<div class="badge badge-revised">&#10003; ' + revised + ' REVISED</div>';
    if (waiting) html += '<div class="badge badge-waiting">&#9203; ' + waiting + ' AWAITING</div>';
    html += '</div></div><div class="grid" id="grid-' + orderId + '"></div>';
    html += '<div class="footer-note">After requesting an edit, you\'ll receive a reply by email. Just reply back to continue the conversation.</div>';
    detail.innerHTML = html;
    var grid = document.getElementById('grid-' + orderId);
    files.forEach(function(f,i){ grid.appendChild(buildCard(f,i,_customerEmail)); });
  }

  function buildCard(f,idx,ce) {
    var inProg     = f.revision_status === 'in_progress';
    var isDelivered = f.revision_status === 'delivered';
    var isAwaiting  = !isDelivered && !inProg;
    var isVectorArt = f.service_type && f.service_type.toLowerCase().indexOf('vector') !== -1;
    var hasHistory = true;
    var label      = 'Design ' + (idx+1);
    var subLabel   = isAwaiting ? 'Original upload' : (f.is_revised ? 'Latest revision' : 'Final artwork');
    var statusBadge = f.is_revised ? '<span class="card-status-badge revised">REVISED</span>' : '';
    var card = document.createElement('div');
    card.className = 'card' + (inProg && !isVectorArt?' inprogress':(f.is_revised?' revised':(isAwaiting?' original':'')));
    card.id = 'card-' + f.id;
    card.dataset.file  = JSON.stringify(f);
    card.dataset.label = label;
    card.dataset.ce    = ce||'';
    card.dataset.fid   = f.id;

    var filesListHtml = '<div class="files-list">';
    f.current_files.forEach(function(cf, i){
      var fileLabel = f.current_files.length > 1 ? 'File ' + (i+1) : subLabel;
      var fileMeta = f.current_files.length > 1 ? subLabel : (cf.version === 1 ? 'Original file' : 'Version ' + (cf.version - 1));
      var previewSrc = isVectorArt ? (f.original_preview_url || f.preview_url || cf.preview_url || '') : (cf.preview_url || '');
      var thumb = previewSrc ? '<img src="' + previewSrc + '" onerror="this.parentElement.innerHTML=\'<div class=file-thumb-ph>&#128444;</div>\'">' : '<div class="file-thumb-ph">&#128444;</div>';
      filesListHtml += '<div class="file-row">' +
        '<div class="file-thumb" onclick="viewImg(\'' + (previewSrc||'') + '\',\'' + label + ' \u2014 ' + fileLabel + '\')">' + thumb + '</div>' +
        '<div class="file-info"><div class="file-label">' + fileLabel + '</div><div class="file-meta">' + fileMeta + '</div></div>' +
        (f.latest_version > 1 ? '<a href="' + (cf.download_url||'#') + '" class="file-dl" download target="_blank">&#11015; Download</a>' : '') +
      '</div>';
    });
    filesListHtml += '</div>';

    var noticeText = '';
    var noticeLabel = '';
    var noticeClass = 'waiting-notice';
    if (isVectorArt) {
      if (f.latest_version > 1) {
        noticeClass = 'ready-notice';
        noticeLabel = 'ARTWORK READY';
        noticeText = 'Here is your finished artwork.';
      } else if (inProg) {
        noticeClass = 'waiting-notice';
        noticeLabel = 'IN PROGRESS';
        noticeText = 'This is your uploaded file. Our team is preparing the final artwork.';
      } else if (isDelivered) {
        noticeClass = 'ready-notice';
        noticeLabel = 'DELIVERED';
        noticeText = 'Your artwork has been delivered.';
      } else {
        noticeClass = 'waiting-notice';
        noticeLabel = 'IN PROGRESS';
        noticeText = 'This is your uploaded file. Our team is preparing the final artwork.';
      }
    } else if (isDelivered || f.latest_version > 1) {
      noticeClass = 'ready-notice';
      noticeLabel = 'ARTWORK READY';
      noticeText = 'Here is your finished artwork.';
    } else if (inProg) {
      noticeClass = 'progress-notice';
      noticeLabel = 'REVISION IN PROGRESS';
      noticeText = 'Your edit request is being worked on. We\'ll email you when finished.';
    } else {
      noticeClass = 'waiting-notice';
      noticeLabel = 'IN PROGRESS';
      noticeText = 'This is your uploaded file. Our team is preparing the final artwork.';
    }
    var notice = noticeText ? '<div class="' + noticeClass + '"><span style="font-size:14px;flex-shrink:0">&#128444;</span><div><div class="' + (noticeClass === 'ready-notice' ? 'ready-label' : noticeClass === 'progress-notice' ? 'progress-label' : 'waiting-label') + '">' + noticeLabel + '</div><div class="' + (noticeClass === 'ready-notice' ? 'ready-text' : noticeClass === 'progress-notice' ? 'progress-text' : 'waiting-text') + '">' + noticeText + '</div></div></div>' : '';

    var serviceLabel = f.service_type ? '<div class="design-service">' + f.service_type + '</div>' : '';
    var fileNameLabel = f.original_file_name ? '<div class="design-filename" title="' + f.original_file_name + '">' + f.original_file_name + '</div>' : '';

    card.innerHTML =
      '<div class="card-header"><div><div class="design-name">' + label + '</div>' + serviceLabel + fileNameLabel + '<div class="design-label">' + subLabel + (f.current_files.length > 1 ? ' &middot; ' + f.current_files.length + ' files' : '') + '</div></div>' + statusBadge + '</div>' +
      filesListHtml +
      notice +
      '<div class="actions" id="act-' + f.id + '">' +
      (hasHistory ? '<button class="btn btn-hist" onclick="openHistory(\'' + f.id + '\')">&#128339; History (' + f.latest_version + 'v &middot; ' + f.edit_requests.length + ' req)</button>' : '') +
      ((inProg && !isVectorArt) ? '<button class="btn btn-pend" disabled>&#9999; Revision Already Pending</button>'
              : '<button class="btn btn-edit" onclick="openEditFromCard(\'' + f.id + '\')">&#9999; Request Edit</button>') +
      '</div>';
    return card;
  }

  window.openEditFromCard = function(fid) {
    var card = document.getElementById('card-' + fid);
    var subtaskId = JSON.parse(card.dataset.file).clickup_subtask_id || '';
    var label = card.dataset.label;
    var ce = card.dataset.ce;
    openEdit(fid, subtaskId, label, ce);
  };

  window.openEdit = function(fid, subtaskId, label, ce) {
    _attachments[fid] = [];
    document.getElementById('act-' + fid).innerHTML =
      '<textarea id="note-' + fid + '" placeholder="Describe what needs to change on ' + label + '..."></textarea>' +
      '<input type="file" id="fileinput-' + fid + '" multiple style="display:none" onchange="handleAttach(\'' + fid + '\')">' +
      '<button class="btn-attach" onclick="document.getElementById(\'fileinput-' + fid + '\').click()">&#128206; Attach files (optional)</button>' +
      '<div class="attachments-list" id="ax-list-' + fid + '"></div>' +
      '<div class="btn-row"><button class="btn btn-cancel" style="flex:1" onclick="cancelEdit(\'' + fid + '\')">Cancel</button>' +
      '<button class="btn btn-send" style="flex:2" onclick="sendEdit(\'' + fid + '\')">Send Request</button></div>';
  };

  window.handleAttach = function(fid) {
    var input = document.getElementById('fileinput-' + fid);
    var list = document.getElementById('ax-list-' + fid);
    Array.from(input.files).forEach(function(file){
      var idx = _attachments[fid].length;
      _attachments[fid].push({name: file.name, url: null, uploading: true, xhr: null});
      var item = document.createElement('div');
      item.className = 'attachment-item';
      item.id = 'ax-' + fid + '-' + idx;
      item.innerHTML = '<span class="ax-name" style="flex:none;max-width:40%">' + file.name + '</span>' +
        '<div class="ax-progress-wrap"><div class="ax-progress-bar"><div class="ax-progress-fill" id="ax-fill-' + fid + '-' + idx + '" style="width:0%"></div></div>' +
        '<span class="ax-progress-pct" id="ax-pct-' + fid + '-' + idx + '">0%</span></div>' +
        '<button class="ax-remove" onclick="cancelUpload(\'' + fid + '\',' + idx + ')" title="Cancel upload">&times;</button>';
      list.appendChild(item);

      var uploadPromise = uploadFile(file, 'edit-requests/' + fid, function(pct){
        var fill = document.getElementById('ax-fill-' + fid + '-' + idx);
        var pctEl = document.getElementById('ax-pct-' + fid + '-' + idx);
        if (fill) fill.style.width = pct + '%';
        if (pctEl) pctEl.textContent = pct + '%';
      });
      _attachments[fid][idx].xhr = uploadPromise.xhr;

      uploadPromise.then(function(url){
        if (!_attachments[fid] || !_attachments[fid][idx]) return;
        _attachments[fid][idx].url = url;
        _attachments[fid][idx].uploading = false;
        _attachments[fid][idx].xhr = null;
        item.innerHTML = '<span class="ax-name">&#10003; ' + file.name + '</span>' +
          '<button class="ax-remove" onclick="removeAttach(\'' + fid + '\',' + idx + ')">&times;</button>';
      }).catch(function(err){
        if (!_attachments[fid]) return;
        if (err && err.message === 'cancelled') return;
        if (!_attachments[fid][idx]) return;
        _attachments[fid][idx].uploading = false;
        _attachments[fid][idx].xhr = null;
        item.innerHTML = '<span class="ax-name" style="color:#00aeef">&#9888; ' + file.name + ' \u2014 upload failed</span>' +
          '<button class="ax-remove" onclick="removeAttach(\'' + fid + '\',' + idx + ')">&times;</button>';
      });
    });
    input.value = '';
  };

  window.cancelUpload = function(fid, idx) {
    if (!_attachments[fid] || !_attachments[fid][idx]) return;
    var entry = _attachments[fid][idx];
    if (entry.xhr) { try { entry.xhr.abort(); } catch(e){} }
    _attachments[fid][idx] = null;
    var el = document.getElementById('ax-' + fid + '-' + idx);
    if (el) el.remove();
  };

  window.removeAttach = function(fid, idx) {
    _attachments[fid][idx] = null;
    var el = document.getElementById('ax-' + fid + '-' + idx);
    if (el) el.remove();
  };

  window.cancelEdit = function(fid) {
    delete _attachments[fid];
    var card = document.getElementById('card-' + fid);
    var f = card ? JSON.parse(card.dataset.file) : null;
    var isVec = f && f.service_type && f.service_type.toLowerCase().indexOf('vector') !== -1;
    var hasHistory = f && (f.all_versions.length > 1 || f.edit_requests.length > 0 || isVec);
    var html = '';
    if (hasHistory) {
      html += '<button class="btn btn-hist" onclick="openHistory(\'' + fid + '\')">&#128339; History</button>';
    }
    html += '<button class="btn btn-edit" onclick="openEditFromCard(\'' + fid + '\')">&#9999; Request Edit</button>';
    document.getElementById('act-' + fid).innerHTML = html;
  };

  window.sendEdit = function(fid) {
    var card = document.getElementById('card-' + fid);
    var f = JSON.parse(card.dataset.file);
    var subtaskId = f.clickup_subtask_id || '';
    var label = card.dataset.label;
    var ce = card.dataset.ce;

    var note = document.getElementById('note-' + fid).value.trim();
    if (!note) return;
    var ax = (_attachments[fid] || []).filter(function(a){ return a && a.url; });
    var stillUploading = (_attachments[fid] || []).some(function(a){ return a && a.uploading; });
    if (stillUploading) { alert('Please wait for attachments to finish uploading.'); return; }

    document.getElementById('act-' + fid).innerHTML = '<div style="padding:8px 0;text-align:center;color:#a89880;font-size:12px;">Sending...</div>';

    var attachmentsPayload = ax.map(function(a){ return {name: a.name, url: a.url}; });

    var supabaseInsert = fetch(SUPABASE_URL + '/rest/v1/edit_requests', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'apikey': SUPABASE_ANON,
        'Authorization': 'Bearer ' + SUPABASE_ANON,
        'Prefer': 'return=representation'
      },
      body: JSON.stringify({
        file_id: fid,
        customer_note: note,
        status: 'in_progress',
        attachments: attachmentsPayload
      })
    });

    var zapierNotify = fetch(EDIT_ENDPOINT, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({
        clickup_subtask_id: subtaskId,
        file_name: label,
        note: note,
        customer_email: ce,
        file_id: fid,
        attachments: attachmentsPayload
      })
    });

    Promise.all([supabaseInsert, zapierNotify])
      .then(function(results) {
        if (!results[0].ok) throw new Error('Supabase insert failed: ' + results[0].status);
        delete _attachments[fid];
        var isVec = f.service_type && f.service_type.toLowerCase().indexOf('vector') !== -1;
        var hasHistory = f.all_versions.length > 1 || f.edit_requests.length > 0 || isVec;
        var actEl = document.getElementById('act-' + fid);
        var html = '<div class="sent">&#10003; Sent! Check your email for updates.</div>';
        if (hasHistory) {
          html += '<button class="btn btn-hist" onclick="openHistory(\'' + fid + '\')">&#128339; History</button>';
        }
        html += '<button class="btn btn-edit" onclick="openEditFromCard(\'' + fid + '\')">&#9999; Request Edit</button>';
        actEl.innerHTML = html;
      })
      .catch(function(err) {
        console.error('sendEdit error:', err);
        document.getElementById('act-' + fid).innerHTML = '<div style="padding:8px 0;text-align:center;color:#00aeef;font-size:12px;">Error sending. Please try again.</div>';
      });
  };

  window.openHistory = function(fid) {
    var card  = document.getElementById('card-' + fid);
    var f     = JSON.parse(card.dataset.file);
    var label = card.dataset.label;
    var isVecFile = f.service_type && f.service_type.toLowerCase().indexOf('vector') !== -1;
    var versionGroups = {};
    f.all_versions.forEach(function(v){
      if (!versionGroups[v.version]) versionGroups[v.version] = [];
      versionGroups[v.version].push(v);
    });
    if (isVecFile) {
      var origPreview = f.original_preview_url || f.preview_url || '';
      if (origPreview && !versionGroups[1]) {
        versionGroups[1] = [{
          version: 1,
          download_url: origPreview,
          preview_url: origPreview,
          uploaded_at: f.created_at
        }];
      }
    }
    var versionNums = Object.keys(versionGroups).map(Number).sort(function(a,b){ return a-b; });

    var timeline = [];
    versionNums.forEach(function(vn){
      var filesAtV = versionGroups[vn];
      var ts = filesAtV[0].uploaded_at ? new Date(filesAtV[0].uploaded_at).getTime() : 0;
      timeline.push({ type: 'version', vn: vn, filesAtV: filesAtV, ts: ts });
    });
    f.edit_requests.forEach(function(r){
      var ts = r.created_at ? new Date(r.created_at).getTime() : 0;
      timeline.push({ type: 'request', data: r, ts: ts });
    });
    timeline.sort(function(a,b){ return a.ts - b.ts; });

    var bodyHtml = '';
    timeline.forEach(function(item){
      if (item.type === 'version') {
        var vn = item.vn;
        var filesAtV = item.filesAtV;
        var isCur = vn === f.latest_version;
        var date = filesAtV[0].uploaded_at ? new Date(filesAtV[0].uploaded_at).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}) : '';
        bodyHtml += '<div class="vgroup">' +
          '<div class="vgroup-head">' +
            '<div class="vgroup-num ' + (isCur?'current':'old') + '">' + (vn === 1 ? 'Orig' : 'v' + (vn - 1)) + '</div>' +
            '<div class="vgroup-label">' + (vn === 1 ? 'Original File' : 'Version ' + (vn - 1)) + (isCur ? '<span class="vgroup-cur-badge">CURRENT</span>' : '') + (vn === 1 && isVecFile && f.original_file_name ? '<div style="font-size:10px;color:#a89880;font-weight:400;margin-top:2px;">' + f.original_file_name + '</div>' : '') + '</div>' +
            '<div class="vgroup-date">' + date + '</div>' +
          '</div>' +
          '<div class="vgroup-files">';
        filesAtV.forEach(function(v,i){
          var fileLabel = filesAtV.length > 1 ? 'File ' + (i+1) : 'Design file';
          var thumbSrc = isVecFile ? (f.original_preview_url || f.preview_url || v.preview_url || '') : (v.preview_url || '');
          var thumb = thumbSrc ? '<img src="' + thumbSrc + '" onerror="this.parentElement.innerHTML=\'<div class=file-thumb-ph>&#128444;</div>\'">' : '<div class="file-thumb-ph">&#128444;</div>';
          bodyHtml += '<div class="file-row">' +
            '<div class="file-thumb" onclick="viewImg(this.dataset.src,this.dataset.lbl)" data-src="' + thumbSrc + '" data-lbl="' + label + ' ' + (vn === 1 ? 'Original' : 'v' + (vn-1)) + ' ' + fileLabel + '">' + thumb + '</div>' +
            '<div class="file-info"><div class="file-label">' + (vn === 1 && f.original_file_name ? f.original_file_name : fileLabel) + '</div><div class="file-meta">' + (vn === 1 ? 'Original file' : 'Version ' + (vn - 1)) + '</div></div>' +
            '<a href="' + (v.download_url||'#') + '" class="file-dl" download target="_blank">&#11015; Download</a>' +
          '</div>';
        });
        bodyHtml += '</div></div>';
      } else {
        var r = item.data;
        var ip = r.status === 'in_progress';
        var rDate = r.created_at ? new Date(r.created_at).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}) : '';
        var axHtml = '';
        var atts = r.attachments;
        if (typeof atts === 'string') { try { atts = JSON.parse(atts); } catch(e){ atts = []; } }
        if (atts && atts.length) {
          axHtml = '<div style="margin-top:8px;display:flex;flex-direction:column;gap:4px;">' +
            atts.map(function(a){
              return '<a href="' + a.url + '" target="_blank" style="display:flex;align-items:center;gap:6px;padding:5px 8px;background:#fff;border:1px solid #e8e2d8;border-radius:6px;font-size:11px;color:#3d3020;text-decoration:none;">' +
                '<span style="color:#00aeef;">&#128206;</span>' +
                '<span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">' + (a.name || 'attachment') + '</span>' +
                '<span style="color:#00aeef;font-weight:600;">View</span>' +
              '</a>';
            }).join('') +
          '</div>';
        }
        bodyHtml += '<div class="req-card ' + (ip?'req-pend':'req-res') + '" style="margin-left:0;margin-bottom:16px;">' +
          '<div class="req-head"><div class="' + (ip?'req-lbl-pend':'req-lbl-res') + '">' +
          (ip ? '<span class="pulse" style="width:6px;height:6px;background:#00aeef;"></span> IN PROGRESS' : 'EDIT REQUEST &middot; RESOLVED') +
          '</div><span class="req-date">' + rDate + '</span></div>' +
          '<p class="req-note">&ldquo;' + (r.customer_note||'') + '&rdquo;</p>' +
          axHtml +
          '</div>';
      }
    });

    document.getElementById('drawer-root').innerHTML =
      '<div class="overlay" onclick="closeDrawer()"><div class="drawer" onclick="event.stopPropagation()">' +
      '<div class="drawer-head"><div><div class="drawer-title">' + label + ' &mdash; History</div>' +
      '<div class="drawer-sub">' + versionNums.length + ' version' + (versionNums.length!==1?'s':'') + ' &middot; ' + f.edit_requests.length + ' request' + (f.edit_requests.length!==1?'s':'') + '</div></div>' +
      '<button class="drawer-close" onclick="closeDrawer()">&#10005;</button></div>' +
      '<div class="drawer-body">' + bodyHtml + '</div></div></div>';
    setTimeout(function(){
      var body = document.querySelector('.drawer-body');
      if (body) body.scrollTop = body.scrollHeight;
    }, 50);
  };

  window.toggleAllOrders = function() {
    var btn = document.getElementById('toggle-all-btn');
    var isExpanded = btn && btn.dataset.state === 'expanded';
    if (isExpanded) {
      if (_ordersCache) {
        _ordersCache.forEach(function(o) {
          var card = document.getElementById('order-' + o.shopify_order_id);
          var detail = document.getElementById('detail-' + o.shopify_order_id);
          if (card && detail) { card.dataset.expanded = 'false'; detail.style.display = 'none'; }
        });
      }
      var bannerArea = document.getElementById('quote-banner-area');
      if (bannerArea) {
        bannerArea.querySelectorAll('.order-detail').forEach(function(d){ d.style.display = 'none'; });
      }
      if (btn) { btn.dataset.state = 'collapsed'; btn.innerHTML = '&#9660; Expand All'; }
    } else {
      if (_ordersCache) {
        _ordersCache.forEach(function(o) {
          var card = document.getElementById('order-' + o.shopify_order_id);
          var detail = document.getElementById('detail-' + o.shopify_order_id);
          if (card && detail && card.dataset.expanded !== 'true') {
            card.dataset.expanded = 'true';
            detail.style.display = 'block';
            renderOrderDetail(o.shopify_order_id);
          }
        });
      }
      if (btn) { btn.dataset.state = 'expanded'; btn.innerHTML = '&#9650; Collapse All'; }
    }
  };

  window.toggleAllQuotes = function() {
    var btn = document.getElementById('toggle-all-quotes-btn');
    var isExpanded = btn && btn.dataset.state === 'expanded';
    var qlist = document.getElementById('quotes-list');
    if (!qlist) return;
    var details = qlist.querySelectorAll('.order-detail');
    if (isExpanded) {
      details.forEach(function(d){ d.style.display = 'none'; });
      if (btn) { btn.dataset.state = 'collapsed'; btn.innerHTML = '&#9660; Expand All'; }
    } else {
      details.forEach(function(d){ d.style.display = 'block'; });
      if (btn) { btn.dataset.state = 'expanded'; btn.innerHTML = '&#9650; Collapse All'; }
    }
  };

  window.closeDrawer = function() { document.getElementById('drawer-root').innerHTML = ''; };

  window.viewImg = function(src, label) {
    if (!src) return;
    document.getElementById('viewer-root').innerHTML =
      '<div class="viewer-overlay" onclick="closeViewer()">' +
      '<div class="viewer-top"><span class="viewer-lbl">' + label + '</span>' +
      '<button class="viewer-close" onclick="closeViewer()">&#10005;</button></div>' +
      '<img src="' + src + '" class="viewer-img" onclick="event.stopPropagation()"></div>';
  };

  window.closeViewer = function() { document.getElementById('viewer-root').innerHTML = ''; };

  window.downloadFile = function(url, filename) {
    fetch(url)
      .then(function(r){ return r.blob(); })
      .then(function(blob){
        var a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = filename || 'download';
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        setTimeout(function(){ URL.revokeObjectURL(a.href); }, 1000);
      })
      .catch(function(){ window.open(url, '_blank'); });
  };

  function renderNoOrders(customer) {
    document.getElementById('app-root').innerHTML =
      '<div class="customer-header"><div class="customer-eyebrow">Welcome</div>' +
      '<div class="customer-title">' + (customer.name || customer.email) + '</div></div>' +
      '<div class="not-found"><h1>No orders yet</h1><p>You don\'t have any orders on file. Once you place an order, it\'ll show up here.</p></div>';
  }

  function showNotFound() {
    document.getElementById('app-root').innerHTML =
      '<div class="not-found"><h1>Portal not found</h1><p>This link may have expired or is incorrect. Please check your email or <a href="https://printergrowth.com/account" style="color:#1a1208">log in to your account</a>.</p></div>';
  }
})();
</script>
</body>
</html>
