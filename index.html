<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Your Files — Printer Growth</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Lora:wght@700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #f5f0e8; font-family: 'DM Sans', sans-serif; min-height: 100vh; }
    .nav { background: #fff; border-bottom: 1px solid #e8e2d8; padding: 16px 32px; display: flex; justify-content: space-between; align-items: center; }
    .nav-logo { display: inline-flex; align-items: center; text-decoration: none; }
    .nav-logo img { height: 36px; width: auto; display: block; }
    .nav-login { font-size: 13px; color: #7a6a55; text-decoration: none; }
    .container { max-width: 1080px; margin: 0 auto; padding: 40px 24px; }
    .customer-header { background: #fff; border: 1px solid #e8e2d8; border-radius: 12px; padding: 20px 24px; margin-bottom: 24px; }
    .customer-eyebrow { color: #a89880; font-size: 12px; margin-bottom: 4px; }
    .customer-title { font-family: 'Lora', serif; font-size: 22px; font-weight: 700; color: #1a1208; }
    .customer-meta { display: flex; gap: 16px; color: #7a6a55; font-size: 13px; margin-top: 10px; flex-wrap: wrap; }
    .order-card { background: #fff; border: 1px solid #e8e2d8; border-radius: 12px; padding: 20px 24px; margin-bottom: 16px; transition: box-shadow 0.2s, border-color 0.2s; }
    .order-card:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.07); border-color: #d1c5a5; }
    .order-row { display: flex; justify-content: space-between; align-items: center; gap: 16px; flex-wrap: wrap; cursor: pointer; }
    .order-info { flex: 1; min-width: 200px; }
    .order-num { font-family: 'Lora', serif; font-size: 18px; font-weight: 700; color: #1a1208; }
    .order-sub { font-size: 13px; color: #7a6a55; margin-top: 4px; }
    .order-chev { color: #a89880; font-size: 16px; }
    .order-detail { margin-top: 20px; padding-top: 20px; border-top: 1px solid #f0ece4; }
    .files-title { font-family: 'Lora', serif; font-size: 16px; font-weight: 700; color: #1a1208; }
    .files-subtitle { font-size: 13px; color: #a89880; margin-top: 4px; }
    .files-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 20px; flex-wrap: wrap; gap: 10px; }
    .files-badges { display: flex; gap: 8px; flex-wrap: wrap; }
    .badge { display: flex; align-items: center; gap: 6px; border-radius: 99px; padding: 5px 12px; font-size: 11px; font-weight: 700; letter-spacing: 1px; font-family: monospace; }
    .badge-progress { background: #e6f7fd; border: 1px solid #b3e5fa; color: #005577; }
    .badge-revised { background: #f0fdf4; border: 1px solid #bbf7d0; color: #059669; }
    .badge-waiting { background: #f5f0e8; border: 1px solid #e8e2d8; color: #7a6a55; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 16px; }
    .card { background: #fffdf8; border: 1.5px solid #e8e2d8; border-radius: 14px; overflow: hidden; display: flex; flex-direction: column; transition: box-shadow 0.2s; }
    .card:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.07); }
    .card.inprogress { border-color: #00aeef; box-shadow: 0 0 0 3px #00aeef18; }
    .card.revised { border-color: #d1c5a5; }
    .card.original { border-color: #c4b89a; }
    .card-header { padding: 12px 14px 8px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #f0ece4; gap: 10px; }
    .design-name { font-family: 'Lora', serif; font-weight: 700; font-size: 14px; color: #1a1208; line-height: 1.2; }
    .design-label { font-size: 10px; color: #a89880; font-family: monospace; text-transform: uppercase; letter-spacing: 0.5px; margin-top: 2px; }
    .card-status-badge { font-size: 9px; padding: 3px 8px; border-radius: 99px; font-weight: 700; letter-spacing: 1.5px; font-family: monospace; flex-shrink: 0; }
    .card-status-badge.progress { background: #00aeef; color: #fff; }
    .card-status-badge.revised { background: #059669; color: #fff; }
    .card-status-badge.original { background: #7a6a55; color: #fff; }
    .files-list { padding: 12px 14px; display: flex; flex-direction: column; gap: 10px; }
    .file-row { display: flex; gap: 10px; align-items: center; padding: 8px; background: #f5f0e8; border-radius: 8px; }
    .file-thumb { width: 56px; height: 56px; border-radius: 6px; background: #f0ece4; overflow: hidden; flex-shrink: 0; cursor: pointer; position: relative; }
    .file-thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .file-thumb-ph { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; font-size: 20px; color: #c4b89a; }
    .file-info { flex: 1; min-width: 0; }
    .file-label { font-size: 12px; font-weight: 600; color: #1a1208; }
    .file-meta { font-size: 11px; color: #a89880; margin-top: 2px; }
    .file-dl { font-size: 11px; font-weight: 600; text-decoration: none; color: #00aeef; padding: 6px 10px; border-radius: 6px; background: #fff; border: 1px solid #b3e5fa; flex-shrink: 0; }
    .file-dl:hover { background: #e6f7fd; }
    .progress-notice, .waiting-notice { border-radius: 8px; padding: 8px 12px; display: flex; gap: 8px; align-items: flex-start; margin: 0 14px 10px; }
    .progress-notice { background: #e6f7fd; border: 1px solid #b3e5fa; }
    .waiting-notice { background: #f5f0e8; border: 1px solid #e8e2d8; }
    .progress-label, .waiting-label { font-size: 10px; font-weight: 700; letter-spacing: 1px; font-family: monospace; }
    .progress-label { color: #005577; }
    .waiting-label { color: #7a6a55; }
    .progress-text, .waiting-text { font-size: 11px; margin-top: 2px; line-height: 1.4; }
    .progress-text { color: #0088bb; }
    .waiting-text { color: #7a6a55; }
    .actions { padding: 10px 14px 14px; display: flex; flex-direction: column; gap: 6px; margin-top: auto; border-top: 1px solid #f0ece4; }
    .btn { width: 100%; padding: 9px 0; border-radius: 8px; font-size: 12px; font-family: 'DM Sans', sans-serif; cursor: pointer; text-align: center; border: none; text-decoration: none; display: block; }
    .btn-hist { background: transparent; border: 1.5px solid #e8e2d8; color: #7a6a55; }
    .btn-edit { background: transparent; border: 1.5px solid #e8e2d8; color: #7a6a55; }
    .btn-pend { background: #f5f0e8; border: 1.5px solid #e8e2d8; color: #c4b89a; cursor: not-allowed; }
    .btn-send { background: #00aeef; color: #fff; font-weight: 700; flex: 2; }
    .btn-cancel { background: transparent; border: 1.5px solid #e8e2d8; color: #a89880; flex: 1; }
    .btn-attach { background: transparent; border: 1.5px dashed #c4b89a; color: #7a6a55; padding: 8px; border-radius: 8px; font-size: 11px; cursor: pointer; text-align: center; width: 100%; font-family: 'DM Sans', sans-serif; }
    .btn-attach:hover { border-color: #00aeef; color: #00aeef; }
    .btn-row { display: flex; gap: 6px; }
    .sent { padding: 9px 0; text-align: center; color: #059669; font-size: 12px; font-weight: 600; }
    textarea { width: 100%; height: 68px; padding: 9px 11px; border: 1.5px solid #d1c5a5; border-radius: 8px; resize: none; font-family: 'DM Sans', sans-serif; font-size: 12px; color: #1a1208; background: #fffdf8; outline: none; }
    .attachments-list { display: flex; flex-direction: column; gap: 5px; margin-top: 6px; }
    .attachment-item { display: flex; align-items: center; gap: 6px; padding: 5px 8px; background: #f0ece4; border-radius: 6px; font-size: 11px; color: #3d3020; }
    .attachment-item .ax-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .attachment-item .ax-remove { background: none; border: none; color: #a89880; cursor: pointer; padding: 0 4px; font-size: 14px; }
    .attachment-item .ax-remove:hover { color: #00aeef; }
    .ax-progress-wrap { flex: 1; display: flex; align-items: center; gap: 6px; }
    .ax-progress-bar { flex: 1; height: 5px; background: #e8e2d8; border-radius: 3px; overflow: hidden; }
    .ax-progress-fill { height: 100%; background: #00aeef; transition: width 0.2s; }
    .ax-progress-pct { font-size: 10px; color: #7a6a55; font-family: monospace; min-width: 30px; text-align: right; }
    .footer-note { margin-top: 18px; padding-top: 14px; border-top: 1px solid #f0ece4; color: #c4b89a; font-size: 11px; text-align: center; }
    .overlay { position: fixed; inset: 0; z-index: 9999; background: rgba(10,8,5,0.6); backdrop-filter: blur(3px); display: flex; align-items: flex-end; justify-content: center; }
    .drawer { background: #fffdf8; border-radius: 20px 20px 0 0; width: 100%; max-width: 520px; max-height: 85vh; overflow: hidden; display: flex; flex-direction: column; box-shadow: 0 -8px 40px rgba(0,0,0,0.2); }
    .drawer-head { padding: 20px 22px 16px; border-bottom: 1px solid #f0ece4; display: flex; justify-content: space-between; align-items: flex-start; flex-shrink: 0; }
    .drawer-title { font-family: 'Lora', serif; font-weight: 700; font-size: 17px; color: #1a1208; }
    .drawer-sub { font-size: 12px; color: #a89880; margin-top: 3px; }
    .drawer-close { background: #f0ece4; border: none; border-radius: 50%; width: 32px; height: 32px; cursor: pointer; font-size: 16px; color: #7a6a55; display: flex; align-items: center; justify-content: center; }
    .drawer-body { overflow-y: auto; padding: 20px 22px 32px; }
    .vgroup { margin-bottom: 24px; }
    .vgroup-head { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
    .vgroup-num { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 11px; font-family: monospace; font-weight: 700; flex-shrink: 0; }
    .vgroup-num.current { background: #1a1208; color: #fff; }
    .vgroup-num.old { background: #f0ece4; color: #7a6a55; border: 2px solid #d1c5a5; }
    .vgroup-label { font-weight: 700; font-size: 13px; color: #1a1208; }
    .vgroup-cur-badge { background: #00aeef; color: #fff; font-size: 9px; padding: 2px 7px; border-radius: 99px; font-weight: 700; letter-spacing: 1px; margin-left: 8px; }
    .vgroup-date { font-size: 11px; color: #a89880; margin-left: auto; }
    .vgroup-files { display: flex; flex-direction: column; gap: 8px; margin-left: 42px; }
    .req-card { border-radius: 12px; padding: 10px 14px; margin-left: 42px; margin-top: 8px; margin-bottom: 8px; }
    .req-res { background: #f0fdf4; border: 1.5px solid #bbf7d0; }
    .req-pend { background: #e6f7fd; border: 1.5px solid #b3e5fa; }
    .req-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
    .req-lbl-res { font-size: 10px; font-weight: 700; letter-spacing: 1.2px; font-family: monospace; color: #059669; display: flex; align-items: center; gap: 5px; }
    .req-lbl-pend { font-size: 10px; font-weight: 700; letter-spacing: 1.2px; font-family: monospace; color: #005577; display: flex; align-items: center; gap: 5px; }
    .req-date { font-size: 10px; color: #a89880; font-family: monospace; }
    .req-note { margin: 0; font-size: 13px; color: #3d3020; line-height: 1.5; font-style: italic; }
    .viewer-overlay { position: fixed; inset: 0; z-index: 10000; background: rgba(0,0,0,0.93); display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 24px; }
    .viewer-top { position: absolute; top: 20px; right: 20px; display: flex; gap: 10px; align-items: center; }
    .viewer-lbl { color: #a89880; font-size: 13px; }
    .viewer-close { background: rgba(255,255,255,0.15); border: none; border-radius: 50%; width: 36px; height: 36px; cursor: pointer; font-size: 18px; color: #fff; display: flex; align-items: center; justify-content: center; }
    .viewer-img { max-width: 90vw; max-height: 80vh; object-fit: contain; border-radius: 12px; box-shadow: 0 24px 64px rgba(0,0,0,0.6); }
    .not-found { text-align: center; padding: 80px 24px; }
    .not-found h1 { font-family: 'Lora', serif; font-size: 24px; color: #1a1208; margin-bottom: 12px; }
    .not-found p { color: #a89880; font-size: 14px; }
    .loading { text-align: center; padding: 60px 24px; color: #a89880; font-size: 14px; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }
    .pulse { display: inline-block; border-radius: 50%; animation: pulse 1.5s infinite; }
  </style>
</head>

      xhr.open('POST', url);
      xhr.setRequestHeader('Authorization', 'Bearer ' + SUPABASE_ANON);
      xhr.setRequestHeader('apikey', SUPABASE_ANON);
      xhr.setRequestHeader('Content-Type', file.type || 'application/octet-stream');
      xhr.upload.onprogress = function(e){
        if (e.lengthComputable && onProgress) {
          onProgress(Math.round((e.loaded / e.total) * 100));
        }
      };
      xhr.onload = function(){
        if (xhr.status >= 200 && xhr.status < 300) {
          resolve(SUPABASE_URL + '/storage/v1/object/public/' + encodedBucket + '/' + encodeURIComponent(path));
        } else {
          reject(new Error('Upload failed: ' + xhr.status));
        }
      };
      xhr.onerror = function(){ reject(new Error('Network error')); };
      xhr.onabort = function(){ reject(new Error('cancelled')); };
      xhr.send(file);
    });
    promise.xhr = xhr;
    return promise;
  }

  sq('customers', 'select=*&token=eq.' + token + '&limit=1').then(function(customers) {
    if (!customers || !customers.length) { showNotFound(); return; }
    var customer = customers[0];
    sq('orders', 'select=*&customer_id=eq.' + customer.id + '&order=created_at.desc').then(function(orders) {
      if (!orders || !orders.length) { renderNoOrders(customer); return; }
      var orderIds = orders.map(function(o){ return o.shopify_order_id; });
      var orderIdFilter = 'shopify_order_id=in.(' + orderIds.join(',') + ')';
      Promise.all([
        sq('files', 'select=*&' + orderIdFilter + '&order=created_at.asc'),
        sq('file_versions', 'select=*&order=version.asc'),
        sq('edit_requests', 'select=*&order=created_at.asc')
      ]).then(function(res) {
        var files = res[0]||[], versions = res[1]||[], requests = res[2]||[];
        files = files.map(function(f) {
          f.all_versions  = versions.filter(function(v){ return v.file_id === f.id; });
          f.edit_requests = requests.filter(function(r){ return r.file_id === f.id; });
          if (f.all_versions.length) {
            var maxV = Math.max.apply(null, f.all_versions.map(function(v){ return v.version; }));
            f.latest_version = maxV;
            f.current_files = f.all_versions.filter(function(v){ return v.version === maxV; });
          } else {
            f.latest_version = f.version || 1;
            f.current_files = [{
              id: 'base-' + f.id,
              version: f.version || 1,
              download_url: f.download_url,
              preview_url: f.preview_url,
              uploaded_at: f.created_at
            }];
          }
          return f;
        });
        orders = orders.map(function(o){
          o.files = files.filter(function(f){ return String(f.shopify_order_id) === String(o.shopify_order_id); });
          return o;
        });
        _ordersCache = orders;
        _customerEmail = customer.email;
        render(customer, orders);
      });
    });
  }).catch(showNotFound);

  function render(customer, orders) {
    var html = '<div class="customer-header"><div class="customer-eyebrow">Welcome back</div>';
    html += '<div class="customer-title">' + (customer.name || customer.email) + '</div>';
    html += '<div class="customer-meta"><span>' + orders.length + ' order' + (orders.length!==1?'s':'') + '</span></div></div>';
    html += '<div id="orders-list"></div>';
    document.getElementById('app-root').innerHTML = html;
    var list = document.getElementById('orders-list');
    orders.forEach(function(o,i){
      list.appendChild(buildOrderCard(o));
      if (i === 0) setTimeout(function(){ toggleOrder(o.shopify_order_id); }, 10);
    });
  }

  function buildOrderCard(order) {
    var card = document.createElement('div');
    card.className = 'order-card';
    card.id = 'order-' + order.shopify_order_id;
    card.dataset.expanded = 'false';
    var filesCount = order.files.length;
    var inProg  = order.files.filter(function(f){ return f.revision_status === 'in_progress'; }).length;
    var delivered = order.files.filter(function(f){ return f.revision_status === 'delivered'; }).length;
    var orderDate = order.created_at ? new Date(order.created_at).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}) : '';
    var status = inProg ? 'In progress' : (delivered === filesCount && filesCount > 0 ? 'Ready' : 'Awaiting artwork');
    card.innerHTML =
      '<div class="order-row" onclick="toggleOrder(\'' + order.shopify_order_id + '\')">' +
        '<div class="order-info"><div class="order-num">Order #' + order.shopify_order_number + '</div>' +
        '<div class="order-sub">' + orderDate + ' &middot; ' + filesCount + ' design' + (filesCount!==1?'s':'') + ' &middot; ' + status + '</div></div>' +
        '<div class="order-chev">&#9662;</div>' +
      '</div>' +
      '<div class="order-detail" id="detail-' + order.shopify_order_id + '" style="display:none"></div>';
    return card;
  }

  window.toggleOrder = function(orderId) {
    var card = document.getElementById('order-' + orderId);
    var detail = document.getElementById('detail-' + orderId);
    if (card.dataset.expanded === 'true') {
      detail.style.display = 'none';
      card.dataset.expanded = 'false';
      return;
    }
    card.dataset.expanded = 'true';
    detail.style.display = 'block';
    renderOrderDetail(orderId);
  };

  function renderOrderDetail(orderId) {
    var order = _ordersCache.find(function(o){ return String(o.shopify_order_id) === String(orderId); });
    if (!order) return;
    var detail = document.getElementById('detail-' + orderId);
    var files = order.files;
    var inProg  = files.filter(function(f){ return f.revision_status === 'in_progress'; }).length;
    var revised = files.filter(function(f){ return f.is_revised && f.revision_status === 'delivered'; }).length;
    var waiting = files.filter(function(f){ return f.revision_status !== 'delivered' && f.revision_status !== 'in_progress'; }).length;
    var html = '<div class="files-header"><div><div class="files-title">Your Artwork Files</div>';
    html += '<div class="files-subtitle">' + files.length + ' design' + (files.length!==1?'s':'');
    if (revised) html += ' &middot; ' + revised + ' revised';
    if (inProg)  html += ' &middot; ' + inProg + ' in progress';
    if (waiting) html += ' &middot; ' + waiting + ' awaiting';
    html += '</div></div><div class="files-badges">';
    if (inProg)  html += '<div class="badge badge-progress"><span class="pulse" style="width:7px;height:7px;background:#00aeef;"></span>' + inProg + ' IN PROGRESS</div>';
    if (revised) html += '<div class="badge badge-revised">&#10003; ' + revised + ' REVISED</div>';
    if (waiting) html += '<div class="badge badge-waiting">&#9203; ' + waiting + ' AWAITING</div>';
    html += '</div></div><div class="grid" id="grid-' + orderId + '"></div>';
    html += '<div class="footer-note">After requesting an edit, you\'ll receive a reply by email. Just reply back to continue the conversation.</div>';
    detail.innerHTML = html;
    var grid = document.getElementById('grid-' + orderId);
    files.forEach(function(f,i){ grid.appendChild(buildCard(f,i,_customerEmail)); });
  }

  function buildCard(f,idx,ce) {
    var inProg     = f.revision_status === 'in_progress';
    var isDelivered = f.revision_status === 'delivered';
    var isAwaiting  = !isDelivered && !inProg;
    var hasHistory = f.all_versions.length > 1 || f.edit_requests.length > 0;
    var label      = 'Design ' + (idx+1);
    var subLabel   = isAwaiting ? 'Original upload' : (f.is_revised ? 'Latest revision' : 'Final artwork');
    var statusBadge = inProg ? '<span class="card-status-badge progress">IN PROGRESS</span>'
                    : f.is_revised ? '<span class="card-status-badge revised">REVISED</span>'
                    : isAwaiting ? '<span class="card-status-badge original">ORIGINAL</span>' : '';
    var card = document.createElement('div');
    card.className = 'card' + (inProg?' inprogress':(f.is_revised?' revised':(isAwaiting?' original':'')));
    card.id = 'card-' + f.id;
    card.dataset.file  = JSON.stringify(f);
    card.dataset.label = label;
    card.dataset.ce    = ce||'';
    // Store file_id safely on the element to avoid HTML attribute string corruption
    card.dataset.fid   = f.id;

    var filesListHtml = '<div class="files-list">';
    f.current_files.forEach(function(cf, i){
      var fileLabel = f.current_files.length > 1 ? 'File ' + (i+1) : subLabel;
      var fileMeta = f.current_files.length > 1 ? subLabel : ('Version ' + cf.version);
      var thumb = cf.preview_url ? '<img src="' + cf.preview_url + '" onerror="this.parentElement.innerHTML=\'<div class=file-thumb-ph>&#128444;</div>\'">' : '<div class="file-thumb-ph">&#128444;</div>';
      filesListHtml += '<div class="file-row">' +
        '<div class="file-thumb" onclick="viewImg(\'' + (cf.preview_url||'') + '\',\'' + label + ' \u2014 ' + fileLabel + '\')">' + thumb + '</div>' +
        '<div class="file-info"><div class="file-label">' + fileLabel + '</div><div class="file-meta">' + fileMeta + '</div></div>' +
        '<a href="' + (cf.download_url||'#') + '" class="file-dl" download>&#11015; Download</a>' +
      '</div>';
    });
    filesListHtml += '</div>';

    var notice = inProg ? '<div class="progress-notice"><span style="font-size:14px;flex-shrink:0">&#9203;</span><div><div class="progress-label">REVISION IN PROGRESS</div><div class="progress-text">Your edit request is being worked on. We\'ll email you when finished.</div></div></div>'
                : isAwaiting ? '<div class="waiting-notice"><span style="font-size:14px;flex-shrink:0">&#128444;</span><div><div class="waiting-label">ORIGINAL DESIGN</div><div class="waiting-text">This is your uploaded file. Our team is preparing the final artwork.</div></div></div>' : '';

    card.innerHTML =
      '<div class="card-header"><div><div class="design-name">' + label + '</div><div class="design-label">' + subLabel + (f.current_files.length > 1 ? ' &middot; ' + f.current_files.length + ' files' : '') + '</div></div>' + statusBadge + '</div>' +
      filesListHtml +
      notice +
      '<div class="actions" id="act-' + f.id + '">' +
      (hasHistory ? '<button class="btn btn-hist" onclick="openHistory(\'' + f.id + '\')">&#128339; History (' + f.latest_version + 'v &middot; ' + f.edit_requests.length + ' req)</button>' : '') +
      (inProg ? '<button class="btn btn-pend" disabled>&#9999; Revision Already Pending</button>'
              : '<button class="btn btn-edit" onclick="openEditFromCard(\'' + f.id + '\')">&#9999; Request Edit</button>') +
      '</div>';
    return card;
  }

  // Safe version: reads subtaskId, label, ce from card dataset to avoid HTML attribute string corruption
  window.openEditFromCard = function(fid) {
    var card = document.getElementById('card-' + fid);
    var subtaskId = JSON.parse(card.dataset.file).clickup_subtask_id || '';
    var label = card.dataset.label;
    var ce = card.dataset.ce;
    openEdit(fid, subtaskId, label, ce);
  };

  window.openEdit = function(fid, subtaskId, label, ce) {
    _attachments[fid] = [];
    document.getElementById('act-' + fid).innerHTML =
      '<textarea id="note-' + fid + '" placeholder="Describe what needs to change on ' + label + '..."></textarea>' +
      '<input type="file" id="fileinput-' + fid + '" multiple style="display:none" onchange="handleAttach(\'' + fid + '\')">' +
      '<button class="btn-attach" onclick="document.getElementById(\'fileinput-' + fid + '\').click()">&#128206; Attach files (optional)</button>' +
      '<div class="attachments-list" id="ax-list-' + fid + '"></div>' +
      '<div class="btn-row"><button class="btn btn-cancel" style="flex:1" onclick="cancelEdit(\'' + fid + '\')">Cancel</button>' +
      '<button class="btn btn-send" style="flex:2" onclick="sendEdit(\'' + fid + '\')">Send Request</button></div>';
  };

  window.handleAttach = function(fid) {
    var input = document.getElementById('fileinput-' + fid);
    var list = document.getElementById('ax-list-' + fid);
    Array.from(input.files).forEach(function(file){
      var idx = _attachments[fid].length;
      _attachments[fid].push({name: file.name, url: null, uploading: true, xhr: null});
      var item = document.createElement('div');
      item.className = 'attachment-item';
      item.id = 'ax-' + fid + '-' + idx;
      item.innerHTML = '<span class="ax-name" style="flex:none;max-width:40%">' + file.name + '</span>' +
        '<div class="ax-progress-wrap"><div class="ax-progress-bar"><div class="ax-progress-fill" id="ax-fill-' + fid + '-' + idx + '" style="width:0%"></div></div>' +
        '<span class="ax-progress-pct" id="ax-pct-' + fid + '-' + idx + '">0%</span></div>' +
        '<button class="ax-remove" onclick="cancelUpload(\'' + fid + '\',' + idx + ')" title="Cancel upload">&times;</button>';
      list.appendChild(item);

      var uploadPromise = uploadFile(file, 'edit-requests/' + fid, function(pct){
        var fill = document.getElementById('ax-fill-' + fid + '-' + idx);
        var pctEl = document.getElementById('ax-pct-' + fid + '-' + idx);
        if (fill) fill.style.width = pct + '%';
        if (pctEl) pctEl.textContent = pct + '%';
      });
      _attachments[fid][idx].xhr = uploadPromise.xhr;

      uploadPromise.then(function(url){
        if (!_attachments[fid] || !_attachments[fid][idx]) return;
        _attachments[fid][idx].url = url;
        _attachments[fid][idx].uploading = false;
        _attachments[fid][idx].xhr = null;
        item.innerHTML = '<span class="ax-name">&#10003; ' + file.name + '</span>' +
          '<button class="ax-remove" onclick="removeAttach(\'' + fid + '\',' + idx + ')">&times;</button>';
      }).catch(function(err){
        if (!_attachments[fid]) return;
        if (err && err.message === 'cancelled') return;
        if (!_attachments[fid][idx]) return;
        _attachments[fid][idx].uploading = false;
        _attachments[fid][idx].xhr = null;
        item.innerHTML = '<span class="ax-name" style="color:#00aeef">&#9888; ' + file.name + ' \u2014 upload failed</span>' +
          '<button class="ax-remove" onclick="removeAttach(\'' + fid + '\',' + idx + ')">&times;</button>';
      });
    });
    input.value = '';
  };

  window.cancelUpload = function(fid, idx) {
    if (!_attachments[fid] || !_attachments[fid][idx]) return;
    var entry = _attachments[fid][idx];
    if (entry.xhr) { try { entry.xhr.abort(); } catch(e){} }
    _attachments[fid][idx] = null;
    var el = document.getElementById('ax-' + fid + '-' + idx);
    if (el) el.remove();
  };

  window.removeAttach = function(fid, idx) {
    _attachments[fid][idx] = null;
    var el = document.getElementById('ax-' + fid + '-' + idx);
    if (el) el.remove();
  };

  window.cancelEdit = function(fid) {
    var card = document.getElementById('card-' + fid);
    var subtaskId = JSON.parse(card.dataset.file).clickup_subtask_id || '';
    var label = card.dataset.label;
    var ce = card.dataset.ce;
    delete _attachments[fid];
    document.getElementById('act-' + fid).innerHTML =
      '<button class="btn btn-edit" onclick="openEditFromCard(\'' + fid + '\')">&#9999; Request Edit</button>';
  };

  window.sendEdit = function(fid) {
    // Read all data safely from card dataset — no HTML attribute string corruption possible
    var card = document.getElementById('card-' + fid);
    var f = JSON.parse(card.dataset.file);
    var subtaskId = f.clickup_subtask_id || '';
    var label = card.dataset.label;
    var ce = card.dataset.ce;

    var note = document.getElementById('note-' + fid).value.trim();
    if (!note) return;
    var ax = (_attachments[fid] || []).filter(function(a){ return a && a.url; });
    var stillUploading = (_attachments[fid] || []).some(function(a){ return a && a.uploading; });
    if (stillUploading) { alert('Please wait for attachments to finish uploading.'); return; }

    document.getElementById('act-' + fid).innerHTML = '<div style="padding:8px 0;text-align:center;color:#a89880;font-size:12px;">Sending...</div>';

    var attachmentsPayload = ax.map(function(a){ return {name: a.name, url: a.url}; });

    // 1. Insert directly into Supabase — file_id read from JS variable, never from HTML string
    var supabaseInsert = fetch(SUPABASE_URL + '/rest/v1/edit_requests', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'apikey': SUPABASE_ANON,
        'Authorization': 'Bearer ' + SUPABASE_ANON,
        'Prefer': 'return=representation'
      },
      body: JSON.stringify({
        file_id: fid,
        customer_note: note,
        status: 'in_progress',
        attachments: attachmentsPayload
      })
    });

    // 2. Notify Zapier for ClickUp comment + task status update only
    var zapierNotify = fetch(EDIT_ENDPOINT, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({
        clickup_subtask_id: subtaskId,
        file_name: label,
        note: note,
        customer_email: ce,
        file_id: fid,
        attachments: attachmentsPayload
      })
    });

    Promise.all([supabaseInsert, zapierNotify])
      .then(function(results) {
        if (!results[0].ok) throw new Error('Supabase insert failed: ' + results[0].status);
        delete _attachments[fid];
        var hasHistory = f.all_versions.length > 1 || f.edit_requests.length > 0;
        var actEl = document.getElementById('act-' + fid);
        var html = '<div class="sent">&#10003; Sent! Check your email for updates.</div>';
        if (hasHistory) {
          html += '<button class="btn btn-hist" onclick="openHistory(\'' + fid + '\')">&#128339; History (' + f.latest_version + 'v &middot; ' + f.edit_requests.length + ' req)</button>';
        }
        html += '<button class="btn btn-edit" onclick="openEditFromCard(\'' + fid + '\')">&#9999; Request Edit</button>';
        actEl.innerHTML = html;
      })
      .catch(function(err) {
        console.error('sendEdit error:', err);
        document.getElementById('act-' + fid).innerHTML = '<div style="padding:8px 0;text-align:center;color:#00aeef;font-size:12px;">Error sending. Please try again.</div>';
      });
  };

  window.openHistory = function(fid) {
    var card  = document.getElementById('card-' + fid);
    var f     = JSON.parse(card.dataset.file);
    var label = card.dataset.label;
    var versionGroups = {};
    f.all_versions.forEach(function(v){
      if (!versionGroups[v.version]) versionGroups[v.version] = [];
      versionGroups[v.version].push(v);
    });
    var versionNums = Object.keys(versionGroups).map(Number).sort(function(a,b){ return a-b; });

    var timeline = [];
    versionNums.forEach(function(vn){
      var filesAtV = versionGroups[vn];
      var ts = filesAtV[0].uploaded_at ? new Date(filesAtV[0].uploaded_at).getTime() : 0;
      timeline.push({ type: 'version', vn: vn, filesAtV: filesAtV, ts: ts });
    });
    f.edit_requests.forEach(function(r){
      var ts = r.created_at ? new Date(r.created_at).getTime() : 0;
      timeline.push({ type: 'request', data: r, ts: ts });
    });
    timeline.sort(function(a,b){ return a.ts - b.ts; });

    var bodyHtml = '';
    timeline.forEach(function(item){
      if (item.type === 'version') {
        var vn = item.vn;
        var filesAtV = item.filesAtV;
        var isCur = vn === f.latest_version;
        var date = filesAtV[0].uploaded_at ? new Date(filesAtV[0].uploaded_at).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}) : '';
        bodyHtml += '<div class="vgroup">' +
          '<div class="vgroup-head">' +
            '<div class="vgroup-num ' + (isCur?'current':'old') + '">v' + vn + '</div>' +
            '<div class="vgroup-label">Version ' + vn + (isCur ? '<span class="vgroup-cur-badge">CURRENT</span>' : '') + '</div>' +
            '<div class="vgroup-date">' + date + '</div>' +
          '</div>' +
          '<div class="vgroup-files">';
        filesAtV.forEach(function(v,i){
          var fileLabel = filesAtV.length > 1 ? 'File ' + (i+1) : 'Design file';
          var thumb = v.preview_url ? '<img src="' + v.preview_url + '" onerror="this.parentElement.innerHTML=\'<div class=file-thumb-ph>&#128444;</div>\'">' : '<div class="file-thumb-ph">&#128444;</div>';
          bodyHtml += '<div class="file-row">' +
            '<div class="file-thumb" onclick="viewImg(\'' + (v.preview_url||'') + '\',\'' + label + ' v' + vn + ' ' + fileLabel + '\')">' + thumb + '</div>' +
            '<div class="file-info"><div class="file-label">' + fileLabel + '</div><div class="file-meta">Version ' + vn + '</div></div>' +
            '<a href="' + (v.download_url||'#') + '" class="file-dl" download>&#11015; Download</a>' +
          '</div>';
        });
        bodyHtml += '</div></div>';
      } else {
        var r = item.data;
        var ip = r.status === 'in_progress';
        var rDate = r.created_at ? new Date(r.created_at).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}) : '';
        var axHtml = '';
        var atts = r.attachments;
        if (typeof atts === 'string') { try { atts = JSON.parse(atts); } catch(e){ atts = []; } }
        if (atts && atts.length) {
          axHtml = '<div style="margin-top:8px;display:flex;flex-direction:column;gap:4px;">' +
            atts.map(function(a){
              return '<a href="' + a.url + '" target="_blank" style="display:flex;align-items:center;gap:6px;padding:5px 8px;background:#fff;border:1px solid #e8e2d8;border-radius:6px;font-size:11px;color:#3d3020;text-decoration:none;">' +
                '<span style="color:#00aeef;">&#128206;</span>' +
                '<span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">' + (a.name || 'attachment') + '</span>' +
                '<span style="color:#00aeef;font-weight:600;">View</span>' +
              '</a>';
            }).join('') +
          '</div>';
        }
        bodyHtml += '<div class="req-card ' + (ip?'req-pend':'req-res') + '" style="margin-left:0;margin-bottom:16px;">' +
          '<div class="req-head"><div class="' + (ip?'req-lbl-pend':'req-lbl-res') + '">' +
          (ip ? '<span class="pulse" style="width:6px;height:6px;background:#00aeef;"></span> IN PROGRESS' : 'EDIT REQUEST &middot; RESOLVED') +
          '</div><span class="req-date">' + rDate + '</span></div>' +
          '<p class="req-note">&ldquo;' + (r.customer_note||'') + '&rdquo;</p>' +
          axHtml +
          '</div>';
      }
    });

    document.getElementById('drawer-root').innerHTML =
      '<div class="overlay" onclick="closeDrawer()"><div class="drawer" onclick="event.stopPropagation()">' +
      '<div class="drawer-head"><div><div class="drawer-title">' + label + ' &mdash; History</div>' +
      '<div class="drawer-sub">' + versionNums.length + ' version' + (versionNums.length!==1?'s':'') + ' &middot; ' + f.edit_requests.length + ' request' + (f.edit_requests.length!==1?'s':'') + '</div></div>' +
      '<button class="drawer-close" onclick="closeDrawer()">&#10005;</button></div>' +
      '<div class="drawer-body">' + bodyHtml + '</div></div></div>';
    setTimeout(function(){
      var body = document.querySelector('.drawer-body');
      if (body) body.scrollTop = body.scrollHeight;
    }, 50);
  };

  window.closeDrawer = function() { document.getElementById('drawer-root').innerHTML = ''; };

  window.viewImg = function(src, label) {
    if (!src) return;
    document.getElementById('viewer-root').innerHTML =
      '<div class="viewer-overlay" onclick="closeViewer()">' +
      '<div class="viewer-top"><span class="viewer-lbl">' + label + '</span>' +
      '<button class="viewer-close" onclick="closeViewer()">&#10005;</button></div>' +
      '<img src="' + src + '" class="viewer-img" onclick="event.stopPropagation()"></div>';
  };

  window.closeViewer = function() { document.getElementById('viewer-root').innerHTML = ''; };

  function renderNoOrders(customer) {
    document.getElementById('app-root').innerHTML =
      '<div class="customer-header"><div class="customer-eyebrow">Welcome</div>' +
      '<div class="customer-title">' + (customer.name || customer.email) + '</div></div>' +
      '<div class="not-found"><h1>No orders yet</h1><p>You don\'t have any orders on file. Once you place an order, it\'ll show up here.</p></div>';
  }

  function showNotFound() {
    document.getElementById('app-root').innerHTML =
      '<div class="not-found"><h1>Portal not found</h1><p>This link may have expired or is incorrect. Please check your email or <a href="https://printergrowth.com/account" style="color:#1a1208">log in to your account</a>.</p></div>';
  }
})();
</script>
</body>
</html>
